<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/common :: head('Explore Clubs')"></head>
<body data-rows="3">
<header th:replace="fragments/common :: nav"></header>

<main class="container">
    <h2 class="m-0">Explore Clubs</h2>

    <!-- Filters -->
    <form class="form-row mt-2" th:action="@{/explore/clubs}" method="get">
        <input type="text" name="q" placeholder="Search clubs or universities" th:value="${q}">
        <div class="h-stack">
            <select name="countryId">
                <option value="" th:selected="${countryId == null}">All countries</option>
                <option th:each="co : ${countries}" th:value="${co.id}"
                        th:text="${co.name}" th:selected="${countryId != null and countryId == co.id}">Country</option>
            </select>
            <select name="universityId" th:disabled="${countryId == null}">
                <option value="" th:selected="${universityId == null}">All universities</option>
                <option th:each="u : ${universities}" th:value="${u.id}"
                        th:text="${u.name}" th:selected="${universityId != null and universityId == u.id}">University</option>
            </select>
            <select name="sort">
                <option value="name" th:selected="${sort == 'name'}">Name</option>
                <option value="followers" th:selected="${sort == 'followers'}">Followers</option>
                <option value="members" th:selected="${sort == 'members'}">Members</option>
                <option value="recent" th:selected="${sort == 'recent'}">Recent</option>
            </select>
            <button class="btn" type="submit">Filter</button>
            <a class="btn ghost" th:href="@{/explore/clubs}">Clear</a>
        </div>
    </form>

    <!-- Club cards -->
    <div class="grid mt-2" th:if="${!clubs.empty}">
        <article class="club-card card"
                 th:each="c,iter : ${clubs.content}"
                 th:with="g=${(iter.index % 6) + 1}">
            <!-- Banner (random gradient). Its bottom edge works as the ‘line’. -->
            <div class="ccover" th:classappend="' g' + ${g}">
                <div class="ccover-sheen"></div>
            </div>

            <!-- Avatar: exactly half in banner, half in body -->
            <a class="ccard-avatar" th:href="@{'/clubs/' + ${c.id}}">
        <span class="ccard-avatar__text"
              th:text="${#strings.substring(#strings.trim(c.name),0,2)}">CL</span>
            </a>

            <!-- Body -->
            <div class="ccard-body">
                <div class="ccard-header">
                    <a class="ccard-title" th:href="@{'/clubs/' + ${c.id}}" th:text="${c.name}">Club Name</a>
                    <span class="badge success" th:if="${memberClubIds.contains(c.id)}">Member</span>
                    <span class="badge warn" th:if="${applicationStatuses[c.id] != null}"
                          th:text="${applicationStatuses[c.id]}">PENDING</span>
                </div>

                <div class="meta" th:text="${c.universityName}">University</div>

                <div class="ccard-stats">
                    <div><strong th:text="${c.followerCount}">0</strong> <span class="muted">followers</span></div>
                    <div><strong th:text="${c.memberCount}">0</strong> <span class="muted">members</span></div>
                </div>

                <!-- Actions row (left: apply/cancel/reapply/view, right: follow) -->
                <div class="ccard-actions">
                    <div class="left">
                        <!-- Cancel (pending) -->
                        <form th:if="${cancelEligibleIds != null and cancelEligibleIds.contains(c.id)}"
                              th:action="@{'/clubs/' + ${c.id} + '/apply/cancel'}" method="post" class="inline">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn subtle" type="submit">Cancel</button>
                        </form>

                        <!-- Reapply (rejected) -->
                        <form th:if="${reapplyEligibleIds != null and reapplyEligibleIds.contains(c.id)}"
                              th:action="@{'/clubs/' + ${c.id} + '/apply/reapply'}" method="post" class="inline">
                            <input type="hidden" name="applicationText" value="Following up on my application."/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn" type="submit">Reapply</button>
                        </form>

                        <!-- Apply (eligible) -->
                        <form th:if="${eligibleApplyIds.contains(c.id)}"
                              th:action="@{'/clubs/' + ${c.id} + '/apply'}" method="post" class="inline">
                            <input type="hidden" name="applicationText" value="I'd like to join this club."/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn" type="submit">Apply</button>
                        </form>

                        <a class="btn subtle" th:href="@{'/clubs/' + ${c.id}}">View club</a>
                    </div>

                    <div class="right">
                        <form th:action="@{'/clubs/' + ${c.id} + '/follow'}" method="post" class="inline">
                            <input type="hidden" name="back" th:value="${back}"/>
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button class="btn ghost" type="submit"
                                    th:text="${followedIds.contains(c.id)} ? 'Following' : 'Follow'">Follow</button>
                        </form>
                    </div>
                </div>
            </div>
        </article>
    </div>

    <div class="mt-2" th:if="${clubs.empty}">
        <p class="help">No clubs found.</p>
    </div>

    <!-- Pagination -->
    <div class="h-stack center mt-3" th:if="${clubs.totalPages > 1}">
        <a class="btn subtle" th:if="${!clubs.first}"
           th:href="@{/explore/clubs(q=${q}, countryId=${countryId}, universityId=${universityId}, sort=${sort}, page=${page-1}, size=${size})}">Prev</a>
        <span>Page <strong th:text="${clubs.number + 1}"></strong> / <span th:text="${clubs.totalPages}"></span></span>
        <a class="btn subtle" th:if="${!clubs.last}"
           th:href="@{/explore/clubs(q=${q}, countryId=${countryId}, universityId=${universityId}, sort=${sort}, page=${page+1}, size=${size})}">Next</a>
    </div>
</main>

<!-- Page-scoped CSS for this card layout -->
<style> /* Bigger banner + avatar, and correct body padding to clear avatar */ .club-card { --banner-h: 144px; --avatar: 88px; position: relative; padding: 0; overflow: hidden; } /* Banner with bottom line */ .club-card .ccover { position: relative; height: var(--banner-h); border-radius: 14px 14px 0 0; } .club-card .ccover.g1 { background: linear-gradient(135deg, #6366f1, #22d3ee); } .club-card .ccover.g2 { background: linear-gradient(135deg, #f59e0b, #ef4444); } .club-card .ccover.g3 { background: linear-gradient(135deg, #06b6d4, #10b981); } .club-card .ccover.g4 { background: linear-gradient(135deg, #8b5cf6, #ec4899); } .club-card .ccover.g5 { background: linear-gradient(135deg, #3b82f6, #10b981); } .club-card .ccover.g6 { background: linear-gradient(135deg, #f43f5e, #f59e0b); } .club-card .ccover-sheen { position: absolute; inset: 0; background: radial-gradient(900px 240px at 70% 20%, rgba(255,255,255,.18), transparent 55%); pointer-events: none; } .club-card .ccover::after { content: ""; position: absolute; left: 16px; right: 16px; bottom: -1px; height: 2px; background: var(--border); } /* Avatar: half inside banner, half inside body */ .ccard-avatar { position: absolute; left: 24px; top: calc(var(--banner-h) - (var(--avatar) / 2)); width: var(--avatar); height: var(--avatar); border-radius: 999px; display: grid; place-items: center; border: 4px solid var(--card); background: linear-gradient(135deg, #111827, #374151); text-decoration: none; box-shadow: var(--shadow); z-index: 1; } .ccard-avatar__text { color: #fff; font-weight: 800; } /* Body: pad left past the avatar so text never sits under the circle */ .ccard-body { padding: 16px; padding-top: 22px; /* a bit more breathing under the banner line */ padding-left: calc(24px + var(--avatar) + 16px); /* avatar left(24) + width + gap */ display: flex; flex-direction: column; gap: 8px; } @media (max-width: 460px) { .ccard-body { padding-left: 16px; } /* allow tighter layout on very small screens */ } .ccard-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; } .ccard-title { font-weight: 800; font-size: 18px; color: var(--text); text-decoration: none; } .ccard-title:hover { text-decoration: underline; } .ccard-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 2px; } @media (max-width: 520px) { .ccard-stats { grid-template-columns: 1fr; } } /* Actions row: follow lives fully in the lower body (right side) */ .ccard-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; } .ccard-actions .left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; } .ccard-actions .right { margin-left: auto; } .ccard-actions .right .btn { border-radius: 999px; padding: 8px 14px; } </style>
</body>
</html>
